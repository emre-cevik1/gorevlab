name: proje github entegrasyonu

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Kodu Çek (Checkout)
      uses: actions/checkout@v4

    - name: ⚙️ .NET 8.0 Kurulumu
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # İsteğe bağlı olarak Unit Testleriniz varsa buraya ekleyebilirsiniz:
    # - name: 🧪 Testleri Çalıştır
    #   run: dotnet test

    - name: 🔐 Şifreleri Güvenli Şekilde Enjekte Et
      uses: microsoft/variable-substitution@v1
      with:
        files: 'appsettings.json'
      env:
        ConnectionStrings.DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
        SmtpSettings.Password: ${{ secrets.SMTP_PASSWORD }}
        RecaptchaSettings.SecretKey: ${{ secrets.RECAPTCHA_SECRET }}

    - name: 📦 Projeyi Derle ve Publish Et
      run: dotnet publish -c Release -o ./publish_output

    - name: 🛑 Uygulamayı Durdur (app_offline.htm)
      run: |
        echo "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>Sistem Güncelleniyor</title></head><body style=\"text-align: center; padding: 50px; font-family: sans-serif;\"><h1>Sistem Güncelleniyor</h1><p>Şu an yeni sürüm yükleniyor, lütfen birkaç dakika sonra sayfayı yenileyin.</p></body></html>" > app_offline.htm
        curl --ftp-pasv -T app_offline.htm ftp://${{ secrets.FTP_SERVER }}/httpdocs/ --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" || true
        sleep 5

    # ASP.NET Core uygulamaları çalışırken DLL dosyaları kilitlenebilir.
    # FTP Action, publish klasörünün içindekileri gönderir.
    - name: 🚀 FTP ile Sunucuya Yükle
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /httpdocs/
        security: loose
        timeout: 120000
        # Sadece değişen dosyaları günceller (güvenlidir).
        # Eğer sunucudaki tüm eski dosyaları silip sıfırdan yüklemek isterseniz aşağıdaki satırı açın:
        # dangerous-clean-slate: true

    - name: 🟢 Uygulamayı Tekrar Başlat (app_offline sil)
      if: always()
      run: |
        curl -Q "DELE /httpdocs/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" || true
